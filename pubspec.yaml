name: pokedex
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.4.0
  provider: ^6.0.0
  path_provider: ^2.0.9
  camera: ^0.11.1
  image: ^4.5.4
  tflite_v2: ^1.0.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  fonts:
    - family: Pokemon
      fonts:
        - asset: assets/fonts/PressStart2P.ttf
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
    - assets/tflite/model.tflite
    - assets/tflite/labels.txt